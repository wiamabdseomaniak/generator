name: "generator"
author: "Wiam Abd"
description: "Generates"

inputs:
  email:
    description: "The committer's email address"
    required: true
    default: "${{ github.actor }}@localhost"

  name:
    description: "The committer's name"
    required: true
    default: "${{ github.actor }}"

runs:
  using: "docker"
  image: "Dockerfile"

branding:
  icon: "git-branch"
  color: "red"